  "strategy/respond": {
    title: "Respond",
    section: "Strategy",
    related: ["[[Generator"],
    content: `# Respond — Generator and Manifesting Generator Strategy

The strategy of Respond applies to [[Generator]] and [[Manifesting Generator]] types — together approximately 70 percent of the human population. Both have a defined [[Sacral Center]], the motor that powers life-force energy, and both are designed to engage with life through response rather than initiation.

## What "Respond" Means

Responding means waiting for something in the external environment to arise — a question, an offer, an event, a sound, an image, a moment — and then checking the sacral response before acting. The sacral center has a voice expressed through sounds: *uh-huh* for yes, *unh-unh* for no. These sounds indicate whether the generator's life force is engaged with the thing in front of them or not.

> "All they have to do is respond. They're not here to initiate. And what that means is that they're not here to initiate according to making decisions to initiate a decision."
> — Ra Uru Hu

Responding does not mean passivity. Generators have the most consistent energy of any type. They are designed to *do* — to work, to build, to give their life force to what genuinely engages them. The waiting is for the *trigger*, not for life itself. Life is constantly presenting things to respond to. The discipline is to wait for that thing to appear rather than going out to manufacture it from the mind.

## Generator: Pure Respond

A [[Generator]] without a motor connected to the throat operates on pure Respond. Things arrive — questions, offers, opportunities — and the sacral either lights up or it doesn't. When it lights up, the Generator follows that energy. When it doesn't, the Generator lets it pass.

When a Generator initiates from the mind, ignoring response, the not-self theme of **frustration** takes over. The Generator pushes against what is in front of them, exhausts their life force on what does not engage them, and ends up burned out and resentful. The signature of a Generator who follows Respond is **satisfaction**.

## Manifesting Generator: Respond and Inform

The [[Manifesting Generator]] shares the Generator's Respond strategy but adds a second step: [[Inform]]. Because Manifesting Generators have a motor connected to the throat, they have the additional capacity to initiate action after responding. This speed allows them to multi-track, skip steps, and pivot quickly — which can create resistance from people who weren't told what was coming.

The sequence for a Manifesting Generator is:

1. Wait for life to present something to respond to.
2. Check the sacral response — yes or no.
3. If yes, inform those who will be impacted before acting.
4. Move.

When a Manifesting Generator skips step 1 (initiates from mind), the not-self theme is **frustration**. When they skip step 3 (doesn't inform), they add **anger** on top. Their signature, like the Generator's, is **satisfaction**.

## Sacral Authority Within Respond

For Generators and Manifesting Generators without a defined Solar Plexus, Respond is paired with [[Sacral Authority]] — the in-the-moment sacral sound as the actual decision-maker.

For Generators and Manifesting Generators *with* a defined Solar Plexus, Respond is paired with [[Emotional Authority]]. They still wait for the sacral to engage, but then wait again through the emotional wave before committing. The Strategy is the same; the Authority adds time.

## The Practice

The practice of Respond is simple in description and difficult in execution. It requires:

- Trusting that what is meant to come will come without being forced.
- Tolerating the discomfort of not initiating when the mind wants to.
- Listening for the gut sound rather than producing a verbal answer.
- Asking binary yes/no questions of yourself or others when needed.
- Letting things go that the sacral does not light up for.

The first months and years of the experiment often involve a noticeable drop in busyness, followed by a noticeable rise in alignment. The Generator's life narrows to what their life force actually wants to engage with — and then deepens.

## Related Articles

[[Strategy Overview]] | [[Generator]] | [[Manifesting Generator]] | [[Sacral Authority]] | [[Sacral Center]] | [[Emotional Authority]] | [[Inform]] | [[Not-Self]] | [[Signature]]`
  },
  "strategy/inform": {
    title: "Inform",
    section: "Strategy",
    related: ["[[Manifestor"],
    content: `# Inform — Manifestor Strategy

The strategy of Inform applies primarily to [[Manifestor]] types — approximately 8 to 9 percent of the human population — and as the second step of the [[Respond|Respond and Inform]] strategy for [[Manifesting Generator]]s. The Manifestor is the only type that can truly initiate without waiting for an external cue, and Inform is the mechanical adjustment that allows their initiating energy to move through the world with minimum resistance.

## Why Manifestors Need to Inform

The Manifestor aura is closed and repelling. It does not draw others in; it pushes against them. When a Manifestor acts without warning, the impact is felt by everyone in their field — and the typical response from others is suspicion, resistance, or attempts to slow the Manifestor down. None of this is personal. It is the mechanical effect of an unannounced motor moving into space.

Informing addresses this. Informing is not asking permission. It is notification. It tells those who will be affected that something is about to happen, which gives their nervous systems time to adjust and removes the impulse to resist what they didn't see coming.

> "Informing clears the path. It moves things out of the way. It moves mountains, in fact. And it is the only freedom that can be available to the manifestor."
> — Ra Uru Hu

## What to Inform

A Manifestor informs anyone whose life will be affected by an action they are about to take. This includes:

- Partners and family before making decisions that change shared circumstances.
- Coworkers before pivoting on a shared project.
- Friends before changing plans.
- Anyone whose plans depend on the Manifestor's predicted behavior.

What is informed is the *what* — the upcoming action — not the full reasoning or justification. The Manifestor is not opening a discussion. They are extending the courtesy of forewarning so the other person can adjust.

## Children vs Adult Manifestors

Children Manifestors are advised to **ask permission**, not inform. A child living in the home of their parents is operating under their parents' authority and resources. Informing is a strategy for the autonomous adult Manifestor who is responsible for the consequences of their own actions.

This distinction matters in parenting Manifestor children. Manifestor children who are punished or shut down when they try to act without informing or asking learn early to suppress their initiating capacity, and the not-self anger calcifies into something the adult version of them must later unwind.

## The Signature and Not-Self of the Manifestor

When a Manifestor informs consistently, their environment stops fighting them. The closed aura still keeps people at a distance, but the warning removes the surprise — and the Manifestor experiences **peace**, their signature state.

When a Manifestor fails to inform — moves without warning, expects the world to keep up — the not-self theme of **anger** rises. Anger is the friction of an initiating force colliding with the resistance of an environment that wasn't told it was coming.

## Inform Within the Manifesting Generator Strategy

The [[Manifesting Generator]] strategy is **Respond and Inform**. The Manifesting Generator first waits for life to present something, checks the sacral response, and only then — if the response is yes — informs and acts.

When a Manifesting Generator skips informing, the same not-self theme appears: anger, layered onto the Generator's underlying frustration. Manifesting Generators who pivot mid-project without telling their collaborators tend to leave a wake of confusion behind them. Informing slows them down enough to take their environment with them.

## The Practice

The practice of Inform is, mechanically, very small:

- Before doing the thing, say what you are about to do.
- Don't ask permission. Don't justify. Don't soften it into a request.
- Tell the people whose lives or plans will be impacted.
- Then act.

Most resistance to this practice comes from the Manifestor's own conditioning: a sense that informing is weak, redundant, or unnecessary. The experiment is what reveals the truth — informed Manifestors meet far less resistance and arrive at peace far more often than uninformed ones.

## Related Articles

[[Strategy Overview]] | [[Manifestor]] | [[Manifesting Generator]] | [[Respond]] | [[Throat Center]] | [[Heart Center]] | [[Not-Self]] | [[Signature]]`
  },
  "strategy/wait-for-invitation": {
    title: "Wait for the Invitation",
    section: "Strategy",
    related: ["[[Projector"],
    content: `# Wait for the Invitation — Projector Strategy

The strategy of Wait for the Invitation applies to [[Projector]] types — approximately 20 percent of the human population. Projectors do not have the consistent sacral energy of [[Generator]]s and do not carry the initiating capacity of [[Manifestor]]s. Their aura is penetrating and focused, and their role is to see deeply into others rather than to drive action themselves. The Invitation is the mechanism by which a Projector's gift gets received — and only when it is received does the Projector's energy operate correctly.

## What an Invitation Is

An Invitation is genuine recognition of a Projector's value, offered by someone who has actually seen and appreciated what the Projector brings. It is a formal opening — into a role, a relationship, a project, a place to live — that gives the Projector permission to share their gifts.

It is not:

- Someone asking a passing question.
- A request for free advice the Projector has been giving anyway.
- An assumption that the Projector will help because they always do.
- A vague "we should work together sometime."

It is:

- A specific offer of a specific role or relationship.
- An explicit acknowledgement of what the Projector specifically brings.
- An invitation the Projector did not have to chase or hint for.

The four major Invitations to wait for are: love, marriage, career, and where to live. These are the structural decisions of a Projector's life, and each one operates correctly when entered through invitation.

## Why the Invitation Matters

When a Projector enters a situation without invitation, their penetrating aura is read as intrusion. Even if their guidance is accurate, even if their work is excellent, it lands badly because they were not asked. The Projector burns through their non-sacral energy trying to be useful to people who did not want them in that role, and they accumulate the not-self theme of **bitterness** — the bitter taste of being unrecognized despite giving so much.

When a Projector enters through genuine invitation, their work is received. The same insight, the same guidance, the same skill, lands as a gift instead of an imposition. The Projector's signature is **success** — defined not as material gain (though it can include that) but as recognition. Being seen accurately and valued for what they actually offer.

## Smaller Invitations and Daily Life

Strategy does not require waiting for life-changing invitations in every moment. Smaller invitations — to dinner, to a conversation, to share an opinion — operate on the same principle but at smaller scale. A Projector who gives advice to a friend who asked for advice is operating correctly. A Projector who gives advice to a friend who did not ask is jumping the strategy.

The Projector's day-to-day discipline is to notice the difference between *asked* and *unasked*, and to let the unasked things pass without inserting themselves.

## Recognition Comes Before Invitation

Invitations do not arrive randomly. They arrive when a Projector has been seen. The path to invitation, then, is to be in environments where one's gift can be noticed — to share what one knows, to show up where one's skill is relevant, to make oneself visible to the people who would benefit from one's guidance. The Projector who hides waiting for someone to magically know them is using "waiting" as an excuse to disappear. The Projector who shares, displays, and demonstrates — and *then* waits for invitation rather than chasing — gets recognized.

> "Every projector in their life is demanded to master some kind of system. This is the only thing that is really going to make a difference for them. As a projector, when you are prepared, when you can master something, then that invitation will arise."
> — Ra Uru Hu

## How Authority Fits

Once an Invitation arrives, the Projector still has to decide whether to accept. This is where Authority enters:

- [[Emotional Authority]] — wait through the emotional wave before saying yes.
- [[Splenic Authority]] — feel the in-the-moment splenic hit.
- [[Ego Authority]] — listen to what the heart genuinely commits to.
- [[Self-Projected Authority]] — talk it through and listen to what comes out of your own mouth.
- [[Mental Authority]] — use the sounding-board process across multiple environments and people.

The Invitation says *whether to engage at all*. The Authority says *whether to say yes to this specific invitation*.

## The Practice

The practice of Wait for the Invitation:

- Notice the impulse to chase, hint, or hustle. Let it pass.
- Be visible in the environments where your gift is relevant. Don't hide.
- Distinguish *asked* from *unasked*. Respond only to the asked.
- When an invitation arrives, run it through your Authority before accepting.
- Decline invitations that don't carry genuine recognition, even if they look like opportunities.

Projectors who run this experiment consistently report a sharp contrast between the bitter exhaustion of being unrecognized and the rest that comes from being properly seen. Success, as Ra defined it for the Projector, is not what most people mean by success. It is the experience of being recognized for what you actually are.

## Related Articles

[[Strategy Overview]] | [[Projector]] | [[Self-Projected Authority]] | [[Mental Authority]] | [[Splenic Authority]] | [[Emotional Authority]] | [[Ego Authority]] | [[Not-Self]] | [[Signature]]`
  },
  "strategy/wait-lunar-cycle": {
    title: "Wait the Lunar Cycle",
    section: "Strategy",
    related: ["[[Reflector"],
    content: `# Wait the Lunar Cycle — Reflector Strategy

The strategy of Wait the Lunar Cycle applies to [[Reflector]] types — approximately 1 percent of the human population. Reflectors have no defined centers at all. Their aura is sampling and Teflon-like, taking in the field around them but not retaining definition from it. With no defined centers, they have no fixed inner authority, and their decision-making is locked to time — specifically, to the cycle of the Moon.

## Why a Full Cycle

The Moon moves through all 64 gates of the wheel approximately once every 28 days. As it passes through each gate, it temporarily activates definitions in the Reflector's chart — connecting hanging gates into channels, lighting up centers, producing different functional configurations for hours or days at a time. Over the full cycle, the Reflector experiences every possible definition their chart can carry.

This means that any decision a Reflector makes on day one of the cycle is being made from one specific transient definition. The same decision made on day fourteen will look different because a different part of the chart is lit up. Only after the full cycle does the Reflector have the complete experiential sample.

> "The authority for a reflector is time. Just simply time. A specific cycle or a specific sequence. The reflector decision-making process is something that cannot take place in the moment. It is locked to the movement of the Moon."
> — Ra Uru Hu

## What "Waiting" Actually Means

The discipline of waiting can be misread as inactivity. It is not.

> "Waiting is not a stagnant sort of dead space... Waiting can be translated as a higher state of alertness. In waiting, there are things going on... It is being present. It is being ready for precisely those things that you're actually waiting for."
> — Ra Uru Hu

For the Reflector, the lunar cycle is the most pronounced form of this. Twenty-eight days of *sampling* — letting the Moon move them through different mental, emotional, splenic, sacral configurations, watching how the situation feels from each — is the active work. The decision arrives at the end of that sampling. It does not get rushed.

## What to Apply It To

Not every Reflector decision requires a full lunar cycle. The strategy applies to significant life decisions:

- Major relationships and commitments.
- Career changes and job acceptances.
- Where to live and major moves.
- Large financial decisions.
- Decisions that will be hard to reverse.

Day-to-day small choices can run on whatever in-the-moment sampling feels appropriate. The Reflector's discipline is to distinguish what is *significant* from what is *casual*.

## Talking Through with Many

A Reflector benefits from discussing significant decisions with many different people — not for advice, but because each person reflects back a different aspect of the situation. Over the cycle, this collection of reflections gives the Reflector a multi-perspective sample of how the decision lands across different definitions and different fields.

This is similar to how the [[Mental Authority|sounding board]] works for Mental Projectors, but Reflectors are doing it across both *people* and *time* — a layered sampling no other type has access to.

## What Conditioning Looks Like for Reflectors

Reflectors are the most homogenized type because their entire chart is open. The pressures of a fast-paced culture that demands immediate decisions hit Reflectors hardest. A Reflector child asked "Do you want to go to this school?" cannot give a meaningful answer in the moment — but parents rarely have the patience to wait 28 days for one.

Reflectors raised in environments that demanded immediate decisions often develop a pattern of grabbing onto someone else's authority — a parent's, a partner's, a leader's — and using it as a substitute for the lunar cycle. This produces the not-self theme of **disappointment**, the gap between the life the Reflector lives and the life they would have lived if they had been able to sample fully.

> "If you do not demand respect for what you are, you're never going to get it. You just won't... You don't know after a week. You don't know after two weeks. You don't know after three weeks. You don't."
> — Ra Uru Hu

## The Signature: Surprise

When a Reflector lives the lunar cycle, the signature is **surprise** — the pleasant surprise of a life that works. Because Reflectors carry no fixed identity, their reward is not predictability but the ongoing freshness of what arises when they are in the right environment, with the right people, and have given themselves the cycle to choose.

## The Practice

The practice of Wait the Lunar Cycle:

- Identify which decisions are significant enough to warrant the full cycle.
- For those decisions, give yourself the 28 days. Don't truncate.
- Talk through the decision with several different trusted people during the cycle.
- Notice how the decision feels at different points in the lunar movement.
- Demand the time from those around you. Frame it as a non-negotiable, not an apology.
- For smaller decisions, sample however feels right in the moment.

Reflectors who run this experiment report a profound difference between the disappointment of rushed decisions and the surprise of decisions made with the full cycle behind them.

## Related Articles

[[Strategy Overview]] | [[Reflector]] | [[Lunar Authority]] | [[No Direct Inner Authority]] | [[Nine Centers]] | [[Not-Self]] | [[Signature]]`
  },
  "strategy/mind-vs-body": {
    title: "Mind vs Body Decision-Making",
    section: "Strategy",
    related: ["[[Conditioning"],
    content: `# Mind vs Body Decision-Making

The single most central claim of Human Design is that the mind is not equipped to make decisions for the person it lives in. Strategy and Authority exist to bypass mental decision-making and route the decision through the body's mechanical responses instead. Understanding *why* the mind fails at this job — and what the body actually does instead — is the conceptual ground beneath both [[Strategy Overview|Strategy]] and [[Inner Authority Overview|Inner Authority]].

## What the Mind Does Well

The mind is not the enemy. It has clear and legitimate functions:

- Inspiration and creative synthesis.
- Solving abstract problems.
- Articulating thoughts and giving advice to *others*.
- Measuring, comparing, modeling, projecting.

Ra Uru Hu called the mind "outer authority" — useful when other people seek its perspective, but unreliable when it tries to author its own life.

> "The mind is never your Authority. The mind is a passenger, a storyteller, a commentator. It's not here to make decisions."
> — Jovian Archive teaching

## Why the Mind Fails at Decisions

The mind in any given person is shaped by what passes through their [[Open Centers|open centers]]. Open centers absorb and amplify the energies of others, and the mind builds its decision-making criteria out of that absorbed material — the fears of an open spleen, the love-seeking of an open heart, the certainty-seeking of an open head, and so on. None of that material is the person's own design.

When the mind then makes decisions on the basis of that material, the decisions are mechanical responses to [[Conditioning]] rather than expressions of the person. The pro/con list weighs criteria the person did not choose. The "logical" answer routes the person back into the patterns of the [[Not-Self]].

> "You get caught in the trap of thinking that the measurement itself is a way of actually coming to a point of recognition of what is correct for oneself. It's not so."
> — Ra Uru Hu

## What the Body Does

The body, through Strategy and Authority, has access to a different kind of information:

- **Sacral sounds** — the immediate response of life-force engagement or non-engagement to what is in front of the person.
- **Emotional wave** — the rise and fall of feeling over hours and days that, when sampled across the full wave, produces clarity that the moment cannot.
- **Splenic intuition** — the instantaneous, non-repeating signal of safety or danger from the body's oldest awareness center.
- **Ego/heart conviction** — what the will actually wants to commit to, heard in what the person says out loud.
- **Self-projection through speech** — the truth that emerges by hearing oneself talk through a thing.
- **Lunar sampling** — the 28-day cycle that gives the [[Reflector]] a complete experiential survey.

Each of these is a mechanical signal of the person's actual design responding to actual reality. None of them go through the open centers or run on conditioned criteria.

## The Time Problem

A particular dimension of mind-vs-body decision-making is *time*. The mind assumes one universal time-frame — the now. But Ra observed that about 51% of humanity (those with a defined Solar Plexus) have a different natural timing than the other 49%.

> "Unemotional beings are here fundamentally to operate in the now. Their process is oriented to the existential... but if you're an emotional being, you're operating in a different time. It's a very different time, yet most emotional human beings don't pay any attention to the fact that they have a different natural timing but try to emulate the timing of those that don't have a defined emotional system."
> — Ra Uru Hu

For [[Emotional Authority|emotional beings]] there is no truth in the now. For unemotional beings, there is only the now. The mind assumes both kinds of people should make decisions in the same way, which is why so much of the cultural pressure around decision-making produces a not-self response in half the population.

## What Decision-Making Looks Like Through the Body

The shift looks something like this:

| Mind-led decision | Body-led decision |
|---|---|
| Pro/con list | Strategy + Authority |
| "What's the best move?" | "What does my body say?" |
| Decides in the moment | Decides on the body's timing (now, wave, lunar cycle) |
| Anchors in external criteria | Anchors in internal mechanical response |
| Produces not-self themes | Produces signature states |
| Routes through open-center conditioning | Bypasses open-center conditioning |
| Requires belief that the conclusion is right | Requires no belief — only observation of results |

## The Experiment, Not the Doctrine

Human Design is positioned as an experiment, not a belief system. The claim is not "trust your body because mystics say so." The claim is: *try this for a meaningful period of time, observe what happens, and decide from the evidence whether your life works better when run through the body's signals than through the mind's analysis.*

Ra placed the timeline at seven years — the cellular renewal cycle. But the early evidence shows up much sooner. Within the first months of consistent Strategy and Authority practice, most people notice a reduction in the not-self theme (frustration, anger, bitterness, disappointment) and an uptick in the signature state.

## What the Mind Becomes

Living by Strategy and Authority does not silence the mind. The mind keeps measuring, modeling, narrating. The shift is in its *role*. Instead of authoring the person's life, the mind becomes a passenger — observing, articulating, offering perspective when asked, but no longer holding the wheel.

This is the central recovery move of Human Design: not getting rid of the mind, but giving it the right job.

> "Let your mind do all the measuring it wants to do. But save the decision-making for yourself, for the essence of what is you, so that you can move along a track that allows you to fulfill your purpose here."
> — Ra Uru Hu

## Related Articles

[[Strategy Overview]] | [[Inner Authority Overview]] | [[Making Decisions in Practice]] | [[Open Centers]] | [[Conditioning]] | [[Deconditioning]] | [[Not-Self]] | [[Signature]]`

  "strategy/strategy-and-signature": {
    title: "Strategy and Signature",
    section: "Strategy",
    related: ["[[Not-Self"],
    content: `# Strategy and Signature

[[Strategy Overview|Strategy]] and Signature form a feedback loop. Strategy is what the type *does*. Signature is what the type *experiences* when the doing is correct. The relationship between them is mechanical: when a person consistently follows their Strategy (paired with their [[Inner Authority Overview|Authority]]), the Signature state emerges as the natural byproduct. When Strategy is abandoned for mental decision-making, the [[Not-Self]] theme takes its place.

This pairing is what makes Human Design an experiment rather than a doctrine. The Signature is the empirical evidence that Strategy is working. The Not-Self is the empirical evidence that it isn't.

## The Four Signatures by Type

Each type has one Signature, paired with one Not-Self theme.

| Type | Signature | Not-Self |
|---|---|---|
| [[Generator]] | Satisfaction | Frustration |
| [[Manifesting Generator]] | Satisfaction | Frustration (+ Anger when not informing) |
| [[Manifestor]] | Peace | Anger |
| [[Projector]] | Success | Bitterness |
| [[Reflector]] | Surprise | Disappointment |

## Why Each Signature Maps to That Strategy

The pairings are not arbitrary. Each Signature describes the specific quality that arises when that type's aura is engaging with life correctly:

- **Satisfaction** for the [[Generator]] and [[Manifesting Generator]] is the body-level reward of life-force energy being given to something it actually engaged with. The sacral is built to *do* — and when it does what it lit up for, the body settles into satisfaction.

- **Peace** for the [[Manifestor]] is what happens when their initiating energy stops meeting resistance. Informing clears the field, the closed aura is no longer fighting suspicion, and the Manifestor can rest inside their own power.

- **Success** for the [[Projector]] is recognition — being seen accurately and valued for what they actually offer. It is not material success in the conventional sense, though it may include that. It is the experience of having one's gift land.

- **Surprise** for the [[Reflector]] is the freshness of a life that doesn't repeat. Because Reflectors carry no fixed definition, their reward is not the predictability of a settled identity but the ongoing surprise of what arises when they have given themselves the lunar cycle and the right environment.

## Ra on Why the Signature Matters

Ra Uru Hu framed the Signature as a built-in measurement instrument — feedback the person can read on themselves day to day.

> "You can measure your whole life between your not-self theme and your signature on a day-to-day basis. Watch it and see for yourself: where are you? Are you on this side? Are you on that side?... It's not about believing me about what I tell you about this type and this signature and this thing — it's so that you can have these reference points that you can empirically determine for yourself their validity and their value to you."
> — Ra Uru Hu

The Signature is not a goal to manufacture. It is a state that *arrives* when Strategy is being followed. If you find yourself trying to feel satisfied, you are not in the Signature — you are in the mind trying to perform it. The Signature is involuntary. It shows up when the conditions for it (correct Strategy, correct Authority) are in place.

## The Pleasure on the Other Side of the Shadow

Ra spoke of the Signature as the reward built into being yourself.

> "Signature is something that is there for everyone. It's built into you. It's the beauty that's on the other side of the shadow. And there's only one thing that will take you there: you as yourself, breath by breath, as yourself, your own authority, strategy and authority. That's how you get there."
> — Ra Uru Hu

The framing matters. The Signature is not a far-off enlightenment state. It is the ordinary, daily experience of being correctly oneself — the satisfaction of work that engages you, the peace of an environment that stops fighting you, the success of being recognized, the surprise of a life that keeps surprising you.

## Reading Your Own Signal

The practical use of the Signature/Not-Self pairing is as a real-time signal of whether Strategy is being followed. Across the course of a day, a week, a month, the question is:

- How much of my experience right now is the Signature?
- How much is the Not-Self?
- What decision did I just make, and which side did it produce?

This is the empirical loop. Make decisions through Strategy and Authority. Watch what arises. If the not-self theme is dominating, the decisions are being made through the mind. If the Signature state is appearing with regularity, the body's authority is being followed.

> "It's an ongoing measurement, but it's something that gives your mind such a beautiful thing to watch. As you move along in that trajectory, as you move further and further and further towards what your signature is, you will take deep inside the pleasure in that, the beauty in that — because it's what we're here for."
> — Ra Uru Hu

## Related Articles

[[Strategy Overview]] | [[Signature]] | [[Not-Self]] | [[Inner Authority Overview]] | [[Respond]] | [[Inform]] | [[Wait for the Invitation]] | [[Wait the Lunar Cycle]] | [[Deconditioning]]`
  },
  "inner-authority/authority-hierarchy": {
    title: "The Authority Hierarchy",
    section: "Inner Authority",
    related: ["[[Solar Plexus Center"],
    content: `# The Authority Hierarchy

Inner Authority is determined by a strict hierarchy among the body centers. The highest defined center in a person's BodyGraph that carries authority becomes that person's Inner Authority — regardless of energy type, regardless of any other definition lower in the hierarchy. Understanding this hierarchy is what lets a person correctly identify their Authority from their chart.

## The Hierarchy

The order, from most primal to least:

1. **[[Solar Plexus Center]]** — gives [[Emotional Authority]]
2. **[[Sacral Center]]** — gives [[Sacral Authority]]
3. **[[Splenic Center]]** — gives [[Splenic Authority]]
4. **[[Heart Center]]** (when connected to Throat or G) — gives [[Ego Authority]]
5. **[[G Center]]** (when connected to Throat, no Heart definition) — gives [[Self-Projected Authority]]
6. **Mind only** (Head, Ajna, Throat — no body-center definition) — gives [[Mental Authority]]
7. **Nothing defined** — gives [[Lunar Authority]]

## How the Hierarchy Works

The rule is simple: *the highest defined authority-carrying center wins.* You stop at the first defined center you hit going down the list.

This means:

- A Generator with a defined Solar Plexus is **not** a sacral authority. They are an [[Emotional Authority|emotional]] generator. The Solar Plexus overrides the Sacral.
- A Projector with a defined Spleen is **not** a self-projected authority, even if the G is connected to the Throat. The Spleen overrides the G.
- A Manifestor with a defined Heart connected to the Throat is an [[Ego Authority|ego-manifested authority]] — but only if the Solar Plexus and Spleen are not defined.

This is why two people of the same type can have very different decision-making mechanisms. The type determines the Strategy; the hierarchy of defined centers determines the Authority.

## Why the Hierarchy in This Order

Ra Uru Hu placed the Solar Plexus at the top because the emotional wave is the most overriding of the body's signals — when emotional definition is present, no in-the-moment signal can be trusted as clarity. Time is required.

The Sacral comes next as the most powerful in-the-moment signal of life-force engagement. After that, the Spleen — the oldest awareness center, carrying instinct and survival.

Below the spleen, the Heart and G are not awareness centers in the same sense; they govern willpower and identity. Their authorities are slower and more context-dependent (heard through what the person says aloud).

At the bottom: configurations with no body-center authority at all — the Mental Projector who must talk through decisions across multiple environments, and the [[Reflector]] who must wait the full lunar cycle.

## Reading the Hierarchy on a Chart

To identify your Authority from a BodyGraph:

1. **Look at the Solar Plexus** (right side, middle-bottom triangle). If it's colored in, you have Emotional Authority. Done.
2. **Look at the Sacral** (the square below the G in the middle of the chart). If defined and Solar Plexus is not, you have Sacral Authority. Done.
3. **Look at the Spleen** (left side, middle-bottom triangle). If defined and the two above are not, you have Splenic Authority. Done.
4. **Look at the Heart/Ego** (small triangle on the right side, mid-chart). If defined *and* connected to the Throat or to the G — and Solar Plexus, Sacral, and Spleen are all undefined — you have Ego Authority. Done.
5. **Look at the G Center** (the diamond in the middle of the chart). If connected to the Throat — and none of the above are defined — you have Self-Projected Authority. Done.
6. **Check what is defined.** If only Head, Ajna, and/or Throat are defined and nothing else — Mental Authority.
7. **No centers defined** — Lunar Authority.

## Hierarchy Exceptions and Edge Cases

A few notes that often confuse newcomers:

- **Defined Heart without a Throat/G connection does not give Ego Authority.** The Heart must reach the throat (directly or via the G) for Ego to be the operating authority.
- **Defined G without a Throat connection does not give Self-Projected Authority.** The G must reach the Throat.
- **The Head, Ajna, and Throat are not authority-carrying centers** on their own. They are the mind. They only become "the authority" by default when no body center carries decision-making.
- **[[Reflector]]s with hanging gates** still have Lunar Authority. Hanging gates don't form definition unless they connect into a channel.

The [[Minor Authorities]] page covers Ego-Manifested vs Ego-Projected and the rarer Self-Projected configurations in additional depth.

## Why This Matters

The hierarchy is not abstract bookkeeping. It is the rule that tells a person *which body signal to actually use* when making a decision. Getting the Authority right is the difference between running the experiment correctly and running it on the wrong instrument. A person with Emotional Authority who tries to operate on splenic intuition is jumping their authority. A Generator with Emotional Authority who commits on a sacral sound without waiting through the wave is jumping their authority.

Knowing where you sit in the hierarchy — and which signal is your *actual* primary instrument — is the prerequisite for everything else in the experiment.

## Related Articles

[[Inner Authority Overview]] | [[Emotional Authority]] | [[Sacral Authority]] | [[Splenic Authority]] | [[Ego Authority]] | [[Self-Projected Authority]] | [[Mental Authority]] | [[Lunar Authority]] | [[No Direct Inner Authority]] | [[Minor Authorities]] | [[Nine Centers]]`
  },
  "inner-authority/no-direct-inner-authority": {
    title: "No Direct Inner Authority",
    section: "Inner Authority",
    related: ["[[Reflector"],
    content: `# No Direct Inner Authority

Two configurations in Human Design produce no *direct* inner authority — no in-the-moment body signal that resolves decisions. These are [[Reflector]]s (no defined centers at all) and Mental Projectors (definition only in Head, Ajna, and/or Throat — no body-center definition). Ra Uru Hu was careful with the language: these beings do not lack authority, they lack *direct* authority. Their decision-making process runs through time and through other people instead of through a body-center signal.

> "Everybody within the context of human design has a way in which they can make decisions correctly as themselves. Clearly, for those beings who have a direct inner authority, that process is something that is clearly discernible for them and they can access it. If you're a generator, a pure generator, and you're unemotional, then your direct inner authority is going to be your response in the moment."
> — Ra Uru Hu

## Reflectors: Time as Authority

The [[Reflector]]'s authority is the [[Lunar Authority|lunar cycle]]. Because no centers are defined, no fixed signal exists in the body. The Moon — the fastest object moving through the wheel — becomes the agent of authority by activating different definitions in the Reflector's chart over the course of 28 days.

> "The authority for a reflector is time. Just simply time. A specific cycle or a specific sequence. The reflector decision-making process is something that cannot take place in the moment. It is locked to the movement of the Moon."
> — Ra Uru Hu

As the Moon transits the wheel, it hooks up the Reflector's hanging gates into temporary channels. Day by day, the Reflector experiences different temporary definitions — sometimes mental, sometimes emotional, sometimes splenic, sometimes ego. Each transit gives the Reflector a different vantage point on the decision in front of them. Only after the full cycle has played out does the Reflector have the complete experiential sample needed to decide correctly.

### What This Looks Like Day to Day

You cannot meet a Reflector in the moment. Whoever they appear to be on any given day is shaped by the Moon's current position and the environment they are sampling.

> "You can never see a reflector in the moment. Whatever they are in the moment is their relationship to the environment around them and to the program itself. To truly know a reflector, when you first meet one, you're going to have to spend at least a month with them before you even begin to get an essence of who they are."
> — Ra Uru Hu

For a Reflector, the most important practice is demanding the time. A culture optimized for instant decisions will pressure Reflectors into truncating their cycle, and the cost is the not-self theme of disappointment. The Reflector who demands the cycle — and is willing to lose opportunities that won't wait for it — is the Reflector who finds out who they actually are.

> "Anybody that is ready to wait — regardless of what the answer is going to be in the end — these are beings that truly belong in your life."
> — Ra Uru Hu

### Mapping the Cycle

The early practical work for a Reflector is to learn their own lunar pattern. Watching the Moon move through the wheel and noticing which definitions get temporarily activated — and how those definitions change the texture of one's experience — is the long-term project of being a Reflector correctly. Some days the Moon activates an emotional channel and the Reflector experiences a wave. Some days it activates a splenic channel and decisions feel instantaneous. Over time the Reflector builds a map of their own cycle and learns to read where in the cycle they are.

## Mental Projectors: The Sounding Board

Mental Projectors are [[Projector]]s whose only definition is in the mind — some combination of Head, Ajna, and Throat. They have powerful mental definition and a penetrating projector aura, but no defined body center to authorize a decision.

> "The most important thing to understand about being a mental projector is the projector aura: penetrating and focused, burrowing right into the other. The projector at their very best is one-on-one with another human being."
> — Ra Uru Hu

The Mental Projector's authority — the mechanism that lets them make correct decisions — is called the **sounding board**.

### How the Sounding Board Works

When an invitation, opportunity, or decision arises:

1. The Mental Projector cannot answer in the moment. The mind alone cannot resolve it.
2. They discuss the decision with several different trusted others — *one-on-one*, in ordinary conversation.
3. They are *not* seeking advice. They are using the connection with each other person to hear themselves.
4. Each conversation provides a different aura connection — and a different acoustic for the Mental Projector's own voice.
5. Over the course of these conversations, the Mental Projector either notices their perspective shifting (meaning the truth has not yet settled) or notices a consistent pattern in what they keep saying. That consistency is the decision.

> "You are not seeking advice. You are not looking for others to tell you what to do. You need the other in order to hear yourself relative to them."
> — Ra Uru Hu

The key skill is recognition — recognizing in one's own expression what is actually true. Mental Projectors are particularly good at recognition; the sounding-board process is built around that gift.

### Mental Projector vs Reflector

Mental Projectors and Reflectors share the trait of "no direct inner authority" but they operate very differently:

- **Reflectors** are non-energy lunar beings with no definition; their authority is time, specifically the 28-day cycle of the Moon.
- **Mental Projectors** have defined mental definition and the projector aura; their authority is the sounding-board process across multiple one-on-one conversations.

A Reflector who tries to use the sounding board without the lunar cycle is still missing their full sample. A Mental Projector who tries to wait 28 days is misapplying the Reflector strategy to a configuration that doesn't need it. The mechanisms are not interchangeable.

## The Risk of Mental Decision-Making

Both Reflectors and Mental Projectors are particularly vulnerable to making decisions from the conditioned mind — because in both configurations, the mind is the loudest internal voice. Without a body-center authority to override the mind, the homogenized world's pressure to "decide right now" can dominate.

> "What human design is about is navigating. And whether you are a reflector or a mental projector, you have a way in which you can make decisions as yourself. For non-energy types, the conditioning of the homogenized world is the greatest distorting factor. The mental projector and the reflector who make decisions in the moment — these are lives that are lost and not easily or ever recovered."
> — Ra Uru Hu

## The Common Thread: Courage of Conviction

Both configurations require holding the line against external pressure. Both require trusting an authority that does not look like authority to the rest of the world. Both require demanding the time and the conversations they need to operate correctly.

> "You may not have an easily recognizable direct inner authority, but it does not mean you are without one. It means you have to have the courage of your convictions. The only way you can operate correctly is to hold fast to the truth of what it is to be you... You may have a non-direct inner authority, but you do have an authority — an authority that's profound, an authority that's pure, an authority that will guide you no matter what."
> — Ra Uru Hu

## Related Articles

[[Inner Authority Overview]] | [[Mental Authority]] | [[Lunar Authority]] | [[Reflector]] | [[Projector]] | [[Authority Hierarchy]] | [[Wait the Lunar Cycle]] | [[Wait for the Invitation]]`
  },
  "inner-authority/minor-authorities": {
    title: "Minor Authorities",
    section: "Inner Authority",
    related: ["[[Emotional Authority"],
    content: `# Minor Authorities

Approximately 96% of the human population carries one of the three major authorities: [[Emotional Authority]] (~50%), [[Sacral Authority]] (~30%), or [[Splenic Authority]] (~15%). The remaining ~4% carries one of the **minor authorities**. These are the configurations Ra Uru Hu grouped together because they share a common precondition: an undefined Solar Plexus, an undefined Sacral, and an undefined Spleen.

> "Today we're going to deal with the minority authorities — a group of authorities that really represent about four out of every hundred people. To have any of these minor authorities, you must have an undefined solar plex center, an open sacral center, and an open splenic center."
> — Ra Uru Hu

Within that constraint, the minor authorities are:

- **Ego-Manifested Authority** (~1%)
- **Ego-Projected Authority** (<0.5%)
- **Self-Projected Authority** (~2.5%)
- **Mental Authority** (~0.5–1%) — covered fully in [[Mental Authority]] and [[No Direct Inner Authority]]
- **Lunar Authority** (~1%) — covered fully in [[Lunar Authority]] and [[No Direct Inner Authority]]

This page focuses on the three minor authorities anchored in the Heart and G centers — Ego-Manifested, Ego-Projected, and Self-Projected — because these are the ones most likely to be misread without careful attention to the configuration.

## Ego-Manifested Authority

Ego-Manifested Authority belongs to a [[Manifestor]] (or rare configurations) whose Heart center is defined and connected to the Throat — either directly through the 45-21 channel or indirectly through the G center.

The precondition: undefined Solar Plexus, undefined Sacral, undefined Spleen.

The Heart center is a motor. When that motor reaches the Throat, decision-making is driven by the will of the Heart and *expressed verbally*. The voice is the instrument.

### Listening to Your Voice

The discipline of Ego-Manifested Authority is to listen to what you actually say in the moment — not to what your mind wants to say, not to what you think you should say, but to what comes out of your mouth.

> "To have ego-manifested authority really means you have to listen to your throat. You have to listen to what you say — what you are saying to the other person — rather than being stuck in what your mind is telling you."
> — Ra Uru Hu

The spontaneous utterance carries the truth. The mind's rehearsed version does not.

> "It is not what you want to say, or what you think you should say, or what you could say — it is precisely what you do say in the moment. At any time. Because what you are expressing is truly your authority when you are not trying to control it."
> — Ra Uru Hu

After-the-fact mental rehearsal — *I should have said this, I could have said that* — is the conditioned mind trying to take back authority. The actual authority is in the unrehearsed moment.

### Surrendering to the Voice

> "Ego-manifested authority is a very, very pure thing. It is about allowing your voice to initiate your life. It is about sitting back and listening. It is about understanding that each and every expression is your perfection. It is only in surrender that your voice says, 'I am going to do this,' and that can be done as a manifestor. It is only when your voice leads that you can follow."
> — Ra Uru Hu

## Ego-Projected Authority

Ego-Projected Authority is rarer — fewer than one in two hundred people. The configuration: the Heart is defined and connected only to the G center (the 21-45 link becomes 21-51, the channel of initiation), with no Heart-to-Throat connection. The Solar Plexus, Sacral, and Splenic centers are all undefined.

Because the Heart is a motor and the G is not, in this configuration the Heart's power dominates the G. This produces a very powerful identity (G center) animated by willpower (Heart), but sitting in a sea of openness across the rest of the chart.

This is a rare form of [[Projector]]. The same projector strategy applies — [[Wait for the Invitation]] — but with intensified stakes:

> "The strategy and authority of the projector become something essential and dominant for these beings: the only thing that they can truly trust is the invitation to initiate. Their life is all about waiting for the invitation to initiate."
> — Ra Uru Hu

### The Bitterness Trap

Ego-Projected Authority beings have no direct voice (no Heart-to-Throat connection), so they cannot express their authority verbally on their own. They must be invited. Without invitation, the powerful internal motor has nowhere to go, and the not-self theme of bitterness intensifies.

> "The ego-projected authority can be a being that is deeply bitter in this life. Bitter that their power to initiate is totally ignored. Bitter because they are exhausted and overwhelmed, trying to be something they are not."
> — Ra Uru Hu

The correct path is mastery and patience: master a system, become recognized, and let the invitation come.

> "Every projector in their life is demanded to master some kind of system. This is the only thing that is really going to make a difference for them. As a projector, when you are prepared, when you can master something, then that invitation will arise."
> — Ra Uru Hu

## Self-Projected Authority

Self-Projected Authority is the G center defined and connected to the Throat, with no definition in the Solar Plexus, Sacral, Spleen, or Heart. The G can have the Ajna above it — Head → Ajna → Throat → G is still Self-Projected — but the key element is the G-to-Throat connection without Heart involvement.

This is approximately 2.5% of the human population. It is exclusive to Projectors who have no defined motors.

### Hearing the Identity Speak

Self-Projected Authority is decision-making through the voice — specifically, the voice of identity. The G center is the seat of identity, love, and direction; the Throat is expression. When the G speaks through the Throat, the person discovers their truth by hearing what they say.

> "The key in any authority connected to the throat: whatever you need to hear, whatever you need to know, you will discover in what you say. And what you say as a projector is according to the invitation."
> — Ra Uru Hu

For a Self-Projected Authority Projector, the practice is:

1. Wait for the invitation (Projector strategy).
2. When invited, talk through the decision aloud — with someone who is simply present to listen.
3. Listen to what comes out of your mouth.
4. The decision is in what you say spontaneously, not what you analyze afterward.

> "When you're invited, listen. Listen to what you say. Hear it. Don't try to figure out what you should say or could say or might say. You are here to trust your spontaneous utterances — what you say in the moment of invitation. That is your truth. You ignore it at your peril."
> — Ra Uru Hu

### The Open Body

The defining feature of Self-Projected Authority is a powerful G-defined identity sitting in an otherwise mostly open chart. No motors, no body-center signals, no emotional wave, no splenic intuition. This makes Self-Projected Projectors particularly susceptible to conditioning across every other center — and their authority depends on having trusted others to talk to.

> "Self-projected authority beings are dealing with a projector that has no motors whatsoever — no root, no sacral, no emotional system, no heart center. They are deeply non-energy beings and, as such, can be totally lost in energy conditioning."
> — Ra Uru Hu

## The Common Theme: Discipline and Courage

All of the minor authorities are easy to misread because they don't operate on the in-the-moment body signals that dominate the major authorities. The voice that carries the truth is fleeting, easy to override mentally, and easy to dismiss as "just talking." The configurations themselves are rare enough that few external models exist for how to live them correctly.

> "All of these minor authorities, like any authority in human design, are a key in your life. Your strategy and authority allows you to navigate on this plane correctly, to move towards the perfection of your being. It does not matter whether your authority is rare or not. What matters is the discipline and the courage to live the correctness of your process."
> — Ra Uru Hu

  "inner-authority/making-decisions": {
    title: "Making Decisions in Practice",
    section: "Inner Authority",
    related: ["[[Inner Authority Overview"],
    content: `# Making Decisions in Practice

Ra Uru Hu said repeatedly that Human Design only ever offered one thing: a way to make decisions correctly as yourself. Every center, every channel, every gate, every transit description in the system is downstream of that one offering. The framework, the chart, the elaborate vocabulary — all of it exists so that a person can identify how their specific body is designed to decide, and then run their life through that mechanism instead of through the mind.

> "I don't get it — it's so simple. I mean, everybody thinks that everything is complex. A lot of people who come to human design think, oh my god, it's so complex. It's not. It's really very simple. It's very simple because it's all based on the same thing: everything is moving. Everything. Everything. Everything is an object moving in space."
> — Ra Uru Hu

> "Human design is only about one thing: it's about offering you the opportunity to understand the best way to make decisions as you, so you can navigate, because that's what this life is about."
> — Ra Uru Hu

## Navigation as the Frame

The mental frame Ra used most consistently was *navigation*. You are an object moving through space, and every decision is a course adjustment. Made correctly, the decision keeps you on a trajectory that is uniquely yours. Made through the mind, the decision sends you off-course onto somebody else's trajectory.

> "If it's moving, then everything about the nature of being, everything about your life and my life, is about navigation — what we call navigation in this life, what we call decision-making. How you make a decision."
> — Ra Uru Hu

> "Making decisions through strategy and authority — it'll get you where you have to go."
> — Ra Uru Hu

## Two Different Time Worlds

One of the most overlooked structural facts about decision-making is that humanity is split nearly in half by timing:

- **About 51%** of humanity has a defined Solar Plexus — emotional beings whose authority operates *over time*.
- **About 49%** of humanity has an undefined Solar Plexus — unemotional beings whose authority operates *in the moment*.

> "Unemotional beings are here fundamentally to operate in the now. Their process is oriented to the existential. They're here to deal with things spontaneously."
> — Ra Uru Hu

> "If you're an emotional being, you're operating in a different time. It's a very different time, yet most emotional human beings don't pay any attention to the fact that they have a different natural timing but try to emulate the timing of those that don't have a defined emotional system."
> — Ra Uru Hu

This means a culture that demands immediate decisions is, by design, asking half the population to operate against their nature. Emotional beings who decide in the moment are not being decisive — they are being not-self. Unemotional beings who agonize over a decision are also being not-self — their design is to know in the moment or to let it pass.

> "You walk up to a person who is unemotional and you say, 'Would you like to?' If they have to agonize over that, if they have to take their time over that, they truly do not know."
> — Ra Uru Hu

## What Waiting Actually Is

The strategies of three of the four types involve some form of waiting. So does the authority of every emotional being, regardless of type. Waiting is the most misunderstood word in Human Design.

> "It's one of those things that so many people when they make human design seem to be confused about. It's a word. It's just a word. It's called waiting. Waiting. So many people think that waiting is a stagnant sort of dead space. You know, nothing is happening. Nothing is going on. Nothing's ever going on. You know, that waiting is a full stop. That waiting is a hesitation. That waiting is something that it's not."
> — Ra Uru Hu

> "Waiting can be translated as a higher state of alertness. In waiting, there are things going on. There is the movement and the process of whatever it is that you're doing. But the waiting is a state. It is a state of awareness. It is being present. It is being ready for precisely those things that you're actually waiting for."
> — Ra Uru Hu

Waiting is not absence. It is presence with a different orientation. The Generator waiting to respond is alert to what is appearing in the environment. The Emotional Authority waiting through the wave is sampling their own internal weather. The Projector waiting for invitation is being visible enough to be seen. The Reflector waiting the lunar cycle is sampling 28 days of different definitions. None of these is doing nothing. All of them are doing the precise opposite of *grabbing*.

## Building the Trust

The hardest part of running the experiment is not the conceptual understanding. It is the trust required to act on a body signal when the mind is screaming a different answer.

The path is incremental. Each decision made through Strategy and Authority that produces a better outcome than the mind would have produced is one piece of evidence. The evidence accumulates. Eventually the mind starts to relax its grip — not because the person decided to trust the body, but because the track record makes the trust mechanical.

This is what Ra called the experiment. There is no leap of faith required. There is only the discipline of running the test, watching the results, and letting the evidence shift the relationship between mind and body over time.

## A Daily Practice

The daily practice of making decisions in Human Design is small and specific:

1. **Notice the decision.** Many decisions get made on autopilot without ever being noticed as decisions. Strategy and Authority require recognizing the moment of choice.
2. **Check the strategy first.** Did this decision arise through your correct type-level engagement (respond, inform, invitation, lunar cycle)? Or are you initiating from the mind?
3. **Check the authority second.** Within the engagement, what does your specific authority say? Sacral sound? Wave-clarity? Splenic hit? Heart-felt conviction? Self-articulation through speech?
4. **Honor the timing.** If the authority is emotional, wait the wave. If splenic, decide now. If sacral, listen for the gut sound. If lunar, take the cycle.
5. **Observe the result.** Did the decision produce the signature state over time? Did it produce the not-self theme? Use the outcome as feedback, not judgment.

## Strategy + Authority as a Pair

Strategy without Authority leaves the decision floating. Authority without Strategy means the body is responding to things it was not meant to respond to in the first place. The two have to be paired.

A Generator with Emotional Authority does not just wait to respond — they also wait through the wave after the sacral lights up. A Projector with Splenic Authority does not just feel a splenic hit — they wait for an invitation to be in the situation where that hit applies. The combinations vary by type and configuration, but the principle is uniform: Strategy says *when and how to engage*, Authority says *how to decide once engaging*.

## Decisions Are the Whole Thing

The recurring claim across Ra's teaching is that there is nothing else.

> "It's about decision-making. This is the whole thing to really grasp about strategy and authority: it's about making a decision. It isn't about anything else."
> — Ra Uru Hu

> "So strategy and authority for the decisions. Let your mind do all the measuring it wants to do. But save the decision-making for yourself, for the essence of what is you, so that you can move along a track that allows you to fulfill your purpose here."
> — Ra Uru Hu

function resolveWikilink(text) {
  const lower = text.toLowerCase().trim();
  if (wikilinkMap[lower]) return '#/' + wikilinkMap[lower];
  // Try partial match
  for (const [k, v] of Object.entries(wikilinkMap)) {
    if (lower.includes(k) || k.includes(lower)) return '#/' + v;
  }
  return null;
}

// ── MARKDOWN RENDERER ──
function renderMarkdown(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  let inUl = false, inOl = false, inTable = false, tableHeader = false;
  let tableRows = [];

  function closeList() {
    if (inUl) { html += '</ul>\n'; inUl = false; }
    if (inOl) { html += '</ol>\n'; inOl = false; }
  }
  function closeTable() {
    if (inTable) {
      html += renderTable(tableRows);
      tableRows = [];
      inTable = false;
      tableHeader = false;
    }
  }

  function renderTable(rows) {
    if (rows.length === 0) return '';
    let out = '<table>\n';
    let headerDone = false;
    let sepIdx = -1;
    // Find separator row (---)
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].every(c => /^[-: ]+$/.test(c))) { sepIdx = i; break; }
    }
    rows.forEach((cells, idx) => {
      if (idx === sepIdx) return;
      const isHeader = (sepIdx > 0 && idx < sepIdx) || (sepIdx === -1 && idx === 0 && !headerDone);
      if (isHeader && !headerDone) {
        out += '<thead><tr>';
        cells.forEach(c => out += `<th>${inlineMarkdown(c.trim())}</th>`);
        out += '</tr></thead>\n<tbody>\n';
        headerDone = true;
      } else {
        out += '<tr>';
        cells.forEach(c => out += `<td>${inlineMarkdown(c.trim())}</td>`);
        out += '</tr>\n';
      }
    });
    if (!headerDone && rows.length > 0) {
      // No header found, render all as body
      out = '<table>\n<tbody>\n';
      rows.forEach(cells => {
        out += '<tr>';
        cells.forEach(c => out += `<td>${inlineMarkdown(c.trim())}</td>`);
        out += '</tr>\n';
      });
    }
    out += '</tbody>\n</table>\n';
    return out;
  }

  function inlineMarkdown(t) {
    // Wikilinks [[Text]] or [[Text|Display]]
    t = t.replace(/\[\[([^\]]+?)(?:\|([^\]]+?))?\]\]/g, (_, target, display) => {
      const label = display || target;
      const href = resolveWikilink(target);
      if (href) return `<a href="${href}">${label}</a>`;
      return `<span class="wikilink-unresolved">${label}</span>`;
    });
    // Bold+Italic
    t = t.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    // Bold
    t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    t = t.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
    // Inline code
    t = t.replace(/`([^`]+?)`/g, '<code>$1</code>');
    return t;
  }

  let paraLines = [];
  function flushPara() {
    if (paraLines.length > 0) {
      const joined = paraLines.join(' ').trim();
      if (joined) html += `<p>${inlineMarkdown(joined)}</p>\n`;
      paraLines = [];
    }
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // Table row
    if (/^\s*\|/.test(line)) {
      flushPara();
      closeList();
      inTable = true;
      const cells = line.split('|').slice(1, -1).map(c => c.trim());
      if (cells.length > 0) tableRows.push(cells);
      continue;
    } else if (inTable) {
      closeTable();
    }

    // Blank line
    if (/^\s*$/.test(line)) {
      flushPara();
      closeList();
      continue;
    }

    // Headings
    const h4 = line.match(/^####\s+(.+)/);
    const h3 = line.match(/^###\s+(.+)/);
    const h2 = line.match(/^##\s+(.+)/);
    const h1 = line.match(/^#\s+(.+)/);

    if (h4) {
      flushPara(); closeList();
      const slug = h4[1].toLowerCase().replace(/[^a-z0-9]+/g, '-');
      html += `<h4 id="${slug}">${inlineMarkdown(h4[1])}</h4>\n`;
    } else if (h3) {
      flushPara(); closeList();
      const slug = h3[1].toLowerCase().replace(/[^a-z0-9]+/g, '-');
      html += `<h3 id="${slug}">${inlineMarkdown(h3[1])}</h3>\n`;
    } else if (h2) {
      flushPara(); closeList();
      const slug = h2[1].toLowerCase().replace(/[^a-z0-9]+/g, '-');
      html += `<h2 id="${slug}">${inlineMarkdown(h2[1])}</h2>\n`;
    } else if (h1) {
      flushPara(); closeList();
      const slug = h1[1].toLowerCase().replace(/[^a-z0-9]+/g, '-');
      html += `<h1 id="${slug}">${inlineMarkdown(h1[1])}</h1>\n`;
    }
    // HR
    else if (/^---+$/.test(line.trim()) || /^\*\*\*+$/.test(line.trim())) {
      flushPara(); closeList();
      html += '<hr>\n';
    }
    // Blockquote
    else if (/^>\s?/.test(line)) {
      flushPara(); closeList();
      html += `<blockquote>${inlineMarkdown(line.replace(/^>\s?/, ''))}</blockquote>\n`;
    }
    // Unordered list
    else if (/^\s*[-*+]\s+/.test(line)) {
      flushPara();
      if (!inUl) { html += '<ul>\n'; inUl = true; }
      if (inOl) { html += '</ol>\n'; inOl = false; }
      const content = line.replace(/^\s*[-*+]\s+/, '');
      html += `<li>${inlineMarkdown(content)}</li>\n`;
    }
    // Ordered list
    else if (/^\s*\d+\.\s+/.test(line)) {
      flushPara();
      if (!inOl) { html += '<ol>\n'; inOl = true; }
      if (inUl) { html += '</ul>\n'; inUl = false; }
      const content = line.replace(/^\s*\d+\.\s+/, '');
      html += `<li>${inlineMarkdown(content)}</li>\n`;
    }
    // Regular paragraph text
    else {
      paraLines.push(line);
    }
  }

  flushPara();
  closeList();
  closeTable();

  return html;
}

// ── TABLE OF CONTENTS ──
function buildTOC(content) {
  const h2s = [];
  const lines = content.split('\n');
  for (const line of lines) {
    const m = line.match(/^##\s+(.+)/);
    if (m) h2s.push(m[1]);
  }
  if (h2s.length < 2) return '';
  let toc = '<div id="toc"><div id="toc-title">Contents</div><ol>';
  h2s.forEach((h, i) => {
    const slug = h.toLowerCase().replace(/[^a-z0-9]+/g, '-');
    toc += `<li><a href="#${slug}">${h}</a></li>`;
  });
  toc += '</ol></div>';
  return toc;
}

let sidebarCollapsed = {};

function renderSidebar(filter) {
  const nav = document.getElementById('sidebar-nav');
  const currentKey = getCurrentArticleKey();
  let html = '';

  for (const section of navSections) {
    const matchingArticles = filter
      ? section.articles.filter(a =>
          a.label.toLowerCase().includes(filter.toLowerCase()) ||
          (articles[a.key] && articles[a.key].content.toLowerCase().includes(filter.toLowerCase()))
        )
      : section.articles;

    if (filter && matchingArticles.length === 0) continue;

    const collapsed = !filter && sidebarCollapsed[section.key];
    html += `<div class="sidebar-section${collapsed ? ' collapsed' : ''}" data-section="${section.key}">`;
    html += `<button class="sidebar-section-header" onclick="toggleSection('${section.key}')">
      ${section.label}
      <span class="chevron">&#9660;</span>
    </button>`;
    html += '<ul class="sidebar-section-links">';
    for (const art of matchingArticles) {
      const active = art.key === currentKey ? ' active' : '';
      html += `<li><a href="#/${art.key}" class="${active}">${art.label}</a></li>`;
    }
    html += '</ul></div>';
  }
  nav.innerHTML = html;
}

function toggleSection(key) {
  sidebarCollapsed[key] = !sidebarCollapsed[key];
  renderSidebar(document.getElementById('sidebar-search').value);
}

function handleSidebarSearch(val) {
  renderSidebar(val.trim() || null);
}

function handleHeaderSearch(val) {
  const q = val.trim();
  if (!q) { router(); return; }
  showSearchResults(q);
}

function getCurrentArticleKey() {
  const hash = window.location.hash;
  if (!hash || hash === '#/' || hash === '#') return null;
  return hash.replace(/^#\//, '');
}

function router() {
  const hash = window.location.hash;
  const content = document.getElementById('content');
  document.getElementById('header-search-input').value = '';

  if (!hash || hash === '#/' || hash === '#') {
    renderHome();
    renderSidebar(document.getElementById('sidebar-search').value);
    content.scrollTop = 0;
    window.scrollTo(0, 0);
    return;
  }

  const key = hash.replace(/^#\//, '');
  const article = articles[key];

  if (!article) {
    content.innerHTML = `<div class="article-title">Not Found</div><p>Article "${key}" was not found.</p>`;
    renderSidebar(document.getElementById('sidebar-search').value);
    return;
  }

  renderArticle(key, article);
  renderSidebar(document.getElementById('sidebar-search').value);
  content.scrollTop = 0;
  window.scrollTo(0, 0);
}

function getBreadcrumb(key, article) {
  const sectionKey = key.split('/')[0];
  const section = navSections.find(s => s.key === sectionKey);
  const sectionLabel = section ? section.label : sectionKey;

  return `<span><a href="#/">Home</a></span>
    <span>&rsaquo;</span>
    <span>${sectionLabel}</span>
    <span>&rsaquo;</span>
    <span>${article.title}</span>`;
}

function renderArticle(key, article) {
  const content = document.getElementById('content');
  const toc = buildTOC(article.content);
  const body = renderMarkdown(article.content);
  const breadcrumb = getBreadcrumb(key, article);

  // Related links
  let relatedHtml = '';
  if (article.related && article.related.length > 0) {
    const pills = article.related.map(r => {
      // Strip [[ ]] if present
      const text = r.replace(/^\[\[/, '').replace(/\]\]$/, '');
      const href = resolveWikilink(text);
      if (href) return `<a class="related-pill" href="${href}">${text}</a>`;
      return `<span class="related-pill" style="opacity:0.6">${text}</span>`;
    }).join('');
    if (pills) {
      relatedHtml = `<div id="related-section">
        <h3>Related Articles</h3>
        <div class="related-pills">${pills}</div>
      </div>`;
    }
  }

  content.innerHTML = `
    <div id="breadcrumb">${breadcrumb}</div>
    <h1 class="article-title">${article.title}</h1>
    ${toc}
    <div id="article-body">${body}</div>
    ${relatedHtml}
  `;
}

// ── SEARCH RESULTS ──
function showSearchResults(query) {
  const content = document.getElementById('content');
  const q = query.toLowerCase();
  const results = [];

  for (const [key, art] of Object.entries(articles)) {
    const titleMatch = art.title.toLowerCase().includes(q);
    const contentMatch = art.content.toLowerCase().includes(q);
    if (titleMatch || contentMatch) {
      // Find snippet
      let snippet = '';
      if (contentMatch) {
        const idx = art.content.toLowerCase().indexOf(q);
        const start = Math.max(0, idx - 80);
        const end = Math.min(art.content.length, idx + 160);
        snippet = art.content.slice(start, end)
          .replace(/[#*`|\[\]]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
        const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
        snippet = snippet.replace(re, m => `<mark class="search-highlight">${m}</mark>`);
      }
      results.push({ key, art, titleMatch, snippet });
    }
  }

  // Sort title matches first
  results.sort((a, b) => (b.titleMatch ? 1 : 0) - (a.titleMatch ? 1 : 0));

  const items = results.map(r => `
    <div style="padding: 12px 0; border-bottom: 1px solid #f0f0f0;">
      <a href="#/${r.key}" style="font-size:16px; font-weight:500; color:var(--link)">${r.art.title}</a>
      <div style="font-size:11px; color:var(--text-secondary); margin: 2px 0 4px">${r.art.section}</div>
      ${r.snippet ? `<div style="font-size:13px; color:var(--text-secondary); line-height:1.5">&hellip;${r.snippet}&hellip;</div>` : ''}
    </div>
  `).join('');

  content.innerHTML = `
    <div id="breadcrumb"><a href="#/">Home</a> &rsaquo; Search</div>
    <h1 class="article-title">Search: &ldquo;${query}&rdquo;</h1>
    <p style="color:var(--text-secondary); margin-bottom:16px">${results.length} article${results.length !== 1 ? 's' : ''} found</p>
    ${items || '<p>No articles found matching your search.</p>'}
  `;
}

// ── SIDEBAR TOGGLE ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburger');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
    if (!sidebar.contains(e.target) && e.target !== hamburger) {
      sidebar.classList.remove('open');
    }
  }
});

window.addEventListener('load', () => {
  renderSidebar(null);
  router();
});
